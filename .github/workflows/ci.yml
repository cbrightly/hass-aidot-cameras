name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on: [push, pull_request]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Third-party actions are pinned to full commit SHAs (not moving tags); the
# trailing comment records the human-readable version. Dependabot
# (github-actions ecosystem) proposes SHA bumps.
jobs:
  # Runs inside an Alpine (musl) container - the same runtime Home Assistant
  # OS / Container uses - so checks run exactly where the integration lives.
  # Alpine container jobs REQUIRE node24-runtime actions (checkout@v5+): GitHub's
  # node20 binary is glibc-only and cannot execute inside a musl container.
  validate:
    name: Validate (Alpine / musl - HA runtime)
    runs-on: ubuntu-latest
    container: python:3.13-alpine
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5 (node24, mandatory in a musl container)
      - run: apk add --no-cache git
      - run: pip install flake8
      # Fail only on genuine breakage: syntax errors + undefined names.
      - name: Lint for real errors
        run: flake8 custom_components --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Validate JSON (manifest, strings, translations)
        run: |
          python - <<'PY'
          import json, glob
          for f in sorted(set(
              glob.glob("custom_components/aidot/*.json")
              + glob.glob("custom_components/aidot/translations/*.json")
          )):
              json.load(open(f))
              print("ok", f)
          m = json.load(open("custom_components/aidot/manifest.json"))
          for k in ("domain", "name", "codeowners", "requirements", "version"):
              assert k in m, f"manifest missing required key: {k}"
          print("manifest required keys present")
          PY

  # hassfest is Home Assistant's own integration validator (manifest schema,
  # requirements format, dependencies, etc.) - the HA-native equivalent of a
  # package "build check".
  hassfest:
    name: Hassfest (HA integration validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: home-assistant/actions/hassfest@f4ca6f671bd429efb108c0f2fa0ae8af0215986c  # master

  # HACS validation checks the repo is installable via HACS (hacs.json, repo
  # structure, manifest). 'brands' is ignored: this is a custom repository, not
  # (yet) in the HACS default store / home-assistant/brands.
  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa  # main
        with:
          category: integration
          ignore: brands

  tests:
    name: Tests (Python 3.13 / HA 2026.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd      # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"
      - name: Install test dependencies
        run: pip install -r requirements_test.txt "python-aidot-cameras[webrtc]>=0.9.1"
      - name: Run tests
        run: pytest tests/ -v --timeout=30
