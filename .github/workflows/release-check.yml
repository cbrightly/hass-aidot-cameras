name: Release check

# Runs when a GitHub Release is published. HACS serves releases directly and
# reads the version from custom_components/aidot/manifest.json, so a tag that
# disagrees with the manifest would show users one version while the code
# reports another. This fails the check on a mismatch.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  verify-version:
    name: Tag matches manifest version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Verify release tag == manifest.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest="$(python3 -c "import json; print(json.load(open('custom_components/aidot/manifest.json'))['version'])")"
          echo "release tag: ${tag}   manifest: ${manifest}"
          if [ "${tag}" != "${manifest}" ]; then
            echo "::error::release tag (${tag}) != manifest.json version (${manifest})"
            exit 1
          fi
